# Auto-Fix CI Failures
#
# Triggers when the CI workflow fails on a PR branch. Downloads and classifies
# the failure logs, then escalates the PR for governed human/lane remediation.
#
# Safety:
#   - Never runs on main (direct pushes)
#   - Skips if the failing commit was itself an [auto-fix] (loop prevention)
#   - Does not checkout or execute PR-head code from this privileged workflow
#   - Labels PR "needs-human" with failure categories for governed follow-up
#   - Concurrency group prevents racing with itself
#
# Portability:
#   - Works in any repo whose CI workflow is named "CI"
#   - Keeps the workflow/check name stable while avoiding privileged mutation
#
# Optional vars: NTFY_TOPIC (push notification on outcome)

name: Auto-Fix CI Failures

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches-ignore:
      - main

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

concurrency:
  group: auto-fix-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  auto-fix:
    # workflow_run carries the failed CI run's head_commit. Keep this gate so
    # real CI failures route to governed remediation, but failed [auto-fix]
    # commits do not recursively trigger the privileged classifier.
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch != 'main' &&
      !contains(github.event.workflow_run.head_commit.message || '', '[auto-fix]')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Resolve PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          BRANCH="$HEAD_BRANCH"
          PR_NUMBER=$(gh pr list --repo "$GH_REPO" --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            printf 'skip=true\n' >> "$GITHUB_OUTPUT"
            echo "No open PR for branch $BRANCH - skipping"
          else
            {
              printf 'skip=false\n'
              printf 'number=%s\n' "$PR_NUMBER"
              printf 'branch=%s\n' "$BRANCH"
            } >> "$GITHUB_OUTPUT"
            echo "Resolved PR #$PR_NUMBER on branch $BRANCH"
          fi

      - name: Download failure logs
        if: steps.pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          gh run view "$RUN_ID" \
            --repo "$GH_REPO" \
            --log-failed > /tmp/ci-failure.log 2>&1 || true

          LINES=$(wc -l < /tmp/ci-failure.log)
          echo "Log captured: $LINES lines"
          if [ "$LINES" -eq 0 ]; then
            echo "::warning::Empty failure log - gh run view may have failed"
          fi

      - name: Classify failures
        if: steps.pr.outputs.skip != 'true'
        id: classify
        run: |
          set -euo pipefail
          LOG="/tmp/ci-failure.log"
          CATS=""
          grep -qE '(ruff check|ruff format)'              "$LOG" 2>/dev/null && CATS="${CATS}lint,"
          grep -qE '(pyrefly|pyright)'                     "$LOG" 2>/dev/null && CATS="${CATS}typecheck,"
          grep -qE '(FAILED tests/|pytest.*failed|assert)' "$LOG" 2>/dev/null && CATS="${CATS}test,"
          grep -qE '(pnpm build|tsc.*error|TS[0-9])'       "$LOG" 2>/dev/null && CATS="${CATS}web-build,"
          grep -qE '(yamllint|yaml.*error)'                "$LOG" 2>/dev/null && CATS="${CATS}yaml-lint,"

          CATS="${CATS%,}"
          printf 'categories=%s\n' "${CATS:-unknown}" >> "$GITHUB_OUTPUT"
          echo "Failure categories: ${CATS:-unknown}"

      - name: Escalate for governed remediation
        if: steps.pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          CATEGORIES: ${{ steps.classify.outputs.categories || 'unknown' }}
        run: |
          set -euo pipefail
          gh pr edit "$PR_NUMBER" --add-label "needs-human" --repo "$GH_REPO" || true
          gh pr comment "$PR_NUMBER" \
            --repo "$GH_REPO" \
            --body "Auto-fix classified CI failure categories as \`${CATEGORIES}\`. Privileged workflow auto-mutation is disabled; route this through governed remediation." || true

      - name: Job summary
        if: always() && steps.pr.outputs.skip != 'true'
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          BRANCH: ${{ steps.pr.outputs.branch }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          CATEGORIES: ${{ steps.classify.outputs.categories || 'n/a' }}
        run: |
          set -euo pipefail
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Auto-Fix CI Failures

          | Field | Value |
          |-------|-------|
          | PR | #${PR_NUMBER} |
          | Branch | \`${BRANCH}\` |
          | Triggering run | [${RUN_ID}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${RUN_ID}) |
          | Categories | ${CATEGORIES} |
          | Outcome | ${{ job.status }} |
          EOF

      - name: Upload failure log
        if: always() && steps.pr.outputs.skip != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ci-failure-log-${{ github.event.workflow_run.id }}
          path: /tmp/ci-failure.log
          if-no-files-found: ignore

      - name: Notify
        if: always() && steps.pr.outputs.skip != 'true' && vars.NTFY_TOPIC != ''
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          BRANCH: ${{ steps.pr.outputs.branch }}
          CATEGORIES: ${{ steps.classify.outputs.categories || 'n/a' }}
        run: |
          set -euo pipefail
          STATUS="${{ job.status }}"
          TAGS=$( [ "$STATUS" = "success" ] && echo "white_check_mark,robot" || echo "x,robot" )
          PRIO=$( [ "$STATUS" = "success" ] && echo "default" || echo "high" )
          curl -sf \
            -H "Title: Auto-Fix ${STATUS}" \
            -H "Priority: ${PRIO}" \
            -H "Tags: ${TAGS}" \
            -H "Click: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d "PR #${PR_NUMBER} (${BRANCH}) - ${STATUS} (categories: ${CATEGORIES})" \
            "https://ntfy.sh/${{ vars.NTFY_TOPIC }}" || true
