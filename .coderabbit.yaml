# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
early_access: false

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  review_details: false
  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    ignore_title_keywords:
      - "WIP"
      - "[skip review]"
    ignore_usernames:
      - "dependabot[bot]"
      - "renovate[bot]"
  path_filters:
    - "!**/.venv/**"
    - "!**/.pytest_cache/**"
    - "!**/.ruff_cache/**"
    - "!**/coverage.xml"
  path_instructions:
    - path: ".github/workflows/**"
      instructions: |
        Keep Codecov, Semgrep, CodeRabbit, Claude, and Codex checks advisory unless a governed Hapax task explicitly promotes a stable aggregate check to branch protection.
    - path: "axioms/**"
      instructions: |
        Review changes for axiom weight consistency, implication tier correctness, and cross-reference integrity.
    - path: "domains/**"
      instructions: |
        Verify domain updates preserve controlled vocabulary and do not weaken governance constraints without explicit authority.
    - path: "knowledge/**"
      instructions: |
        Check schema and precedent changes for referential consistency and clear provenance.

chat:
  auto_reply: true
